# i3status configuration file.
# see "man i3status" for documentation.

# It is important that this file is edited as UTF-8.
# The following line should contain a sharp s:
# ß
# If the above line is not correctly displayed, fix your editor first!

general {
        colors = true
        interval = 5
}

#order += "ethernet v"
#order += "ethernet z"
#order += "ethernet jiu"
order += "volume master"
order += "wireless _first_"
order += "time"
order += "battery 1"

volume master {
		#format = "♪:%volume"
		#format_muted = "♪:muted(%volume)"
		format = "🔉%volume"
		format_muted = "🔇%volume"
}

wireless _first_ {
        format_up = "%essid"
        format_down = ""
}

time {
        format = "%a %b %d %Y %I:%M %p"
}

battery 1 {
        format = "%status %percentage"
        format_down = ""
        status_chr = "⚡"
        status_bat = "🔋"
        status_unk = "?"
        status_full = "☻"
        path = "/sys/class/power_supply/BAT%d/uevent"
        low_threshold = 10
}

# path_exists z {
#     path = "/proc/sys/net/ipv4/conf/z"
#     format = "%title"
#     format_down = ""
# }

ethernet z {
    format_up = "👙"
    format_down = ""
}

ethernet v {
    format_up = "👠"
    format_down = ""
}

ethernet jiu {
    format_up = "💰"
    #format_up = "👑"
    format_down = ""
}
